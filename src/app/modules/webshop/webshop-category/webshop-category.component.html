<div *ngIf="isMobileView && !openFilterPopup" class="mobile-filter-bar">
  <button
    class="mobile-filter-trigger"
    type="button"
    (click)="openFilterPopup = true"
  >
    <span class="mobile-filter-trigger__copy">
      <span class="mobile-filter-trigger__title">Filteri</span>
      <span class="mobile-filter-trigger__meta">{{ resultSummaryLabel }}</span>
    </span>

    <span class="mobile-filter-trigger__count" *ngIf="hasActiveFilters && !loading">
      {{ activeFilterCount }}
    </span>
  </button>

  <div class="mobile-filter-bar__chips" *ngIf="hasActiveFilters">
    <span class="sidebar-chip" *ngFor="let chip of summaryChips">
      {{ chip }}
    </span>
  </div>
</div>

<!-- DESKTOP SIDEBAR -->
<div
  *ngIf="
    !isMobileView &&
    (filter.deadStock ||
      (categories && categories !== null) ||
      (manufactures && manufactures.length))
  "
  class="sidebar"
>
  <div class="sidebar-panel">
    <div class="sidebar-header">
      <div>
        <p class="sidebar-kicker">Pretraga kataloga</p>
        <h2 class="sidebar-title">Filteri</h2>
        <p class="sidebar-meta">Suzi izbor po dostupnosti, kategoriji i proizvođaču.</p>
      </div>

      <button
        class="sidebar-reset"
        type="button"
        *ngIf="hasActiveFilters"
        (click)="resetFilters()"
      >
        Obriši sve
      </button>
    </div>

    <div class="sidebar-summary" *ngIf="hasActiveFilters">
      <div class="sidebar-summary__head">
        <span>Aktivni filteri</span>
        <span class="sidebar-summary__count">{{ activeFilterCount }}</span>
      </div>

      <div class="sidebar-summary__chips">
        <span class="sidebar-chip" *ngFor="let chip of summaryChips">
          {{ chip }}
        </span>
      </div>
    </div>

    <div class="filter-section">
    <!-- Availability -->
    <div class="filter-card" [class.collapsed]="isCollapsed('availability')">
      <button
        class="section-title"
        type="button"
        (click)="toggleSection('availability')"
      >
        <span>Raspoloživost</span>
        <i class="chevron" [class.expanded]="!isCollapsed('availability')"></i>
      </button>

      <div class="section-body">
        <availability-filter
          [onStock]="filter.naStanju!"
          (availabilityChanged)="onAvailabilityChanged($event)"
        >
        </availability-filter>
      </div>
    </div>

    <!-- Categories -->
    <div
      class="filter-card"
      *ngIf="categories && !isCategoryWithSubgroup"
      [class.collapsed]="isCollapsed('categories')"
    >
      <button
        class="section-title"
        type="button"
        (click)="toggleSection('categories')"
      >
        <span>Kategorije</span>
        <span class="count-chip" *ngIf="selectedSubgroupsCount">{{
          selectedSubgroupsCount
        }}</span>
        <i class="chevron" [class.expanded]="!isCollapsed('categories')"></i>
      </button>

      <div class="section-body">
        <div class="filter-container">
          <category-filter
            *ngIf="openCategoriesFilters"
            [categories]="categories"
            [selectedSubgroupIds]="filter.podgrupe || []"
            (subgroupsChanged)="onSubgroupsChanged($event)"
          >
          </category-filter>
        </div>
      </div>
    </div>

    <!-- Manufacturers -->
    <div
      class="filter-card"
      *ngIf="manufactures?.length && !isManufPage"
      [class.collapsed]="isCollapsed('manufacturers')"
    >
      <button
        class="section-title"
        type="button"
        (click)="toggleSection('manufacturers')"
      >
        <span>Proizvođači</span>
        <span class="count-chip" *ngIf="selectedManufacturersCount">{{
          selectedManufacturersCount
        }}</span>
        <i class="chevron" [class.expanded]="!isCollapsed('manufacturers')"></i>
      </button>

      <div class="section-body">
        <div
          class="filter-prefilter"
          *ngIf="!isMobileView && (manufactures?.length ?? 0 > 7)"
        >
          <autom-input-fields
            [placeholder]="'Pretraži proizvođače...'"
            [suffixIcon]="iconEnums.FILTER"
            [type]="inputTypeEnum.SEARCH"
            (emitSelected)="preFilterManufactures($event)"
          >
          </autom-input-fields>
        </div>

        <manufacture-filter
          *ngIf="openManufacturesFilters"
          [manufactures]="manufacturesModels"
          [selected]="filter.proizvodjaci || []"
          [filterTerm]="manufacturerPreFilter"
          (selectionChanged)="onManufactureChanged($event)"
        >
        </manufacture-filter>
      </div>
    </div>
    </div>
  </div>
</div>

<!-- MOBILE POPUP -->
<autom-popup
  class="mobile-filters"
  *ngIf="isMobileView && openFilterPopup"
  [height]="sizeEnum.AUTO"
  [position]="positionEnum.BOTTOM"
  [subPosition]="positionEnum.BOTTOM"
  [width]="sizeEnum.FULL"
  [rounded]="true"
>
  <div custom-header class="page-details__header">
    <div class="page-details__title--row">
      <h3 class="h3">Filteri</h3>
    </div>
    <autom-icon
      [color]="colorEnum.GREY_400"
      [source]="iconEnums.X"
      (click)="openFilterPopup = false"
    >
    </autom-icon>
  </div>

  <div custom-body class="page-details__body">
    <div class="mobile-summary" *ngIf="resultCount || hasActiveFilters">
      <div class="mobile-summary__top">
        <div>
          <p class="sidebar-kicker">Pretraga kataloga</p>
          <p class="sidebar-meta">{{ resultSummaryLabel }}</p>
        </div>

        <button
          class="sidebar-reset"
          type="button"
          *ngIf="hasActiveFilters"
          (click)="resetFilters()"
        >
          Obriši sve
        </button>
      </div>

      <div class="sidebar-summary__chips" *ngIf="hasActiveFilters">
        <span class="sidebar-chip" *ngFor="let chip of summaryChips">
          {{ chip }}
        </span>
      </div>
    </div>

    <div class="filter-card">
      <button
        class="section-title"
        type="button"
        (click)="toggleSection('availability')"
      >
        <span>Raspoloživost</span>
        <i class="chevron" [class.expanded]="!isCollapsed('availability')"></i>
      </button>
      <div class="section-body" [class.collapsed]="isCollapsed('availability')">
        <availability-filter
          [onStock]="filter.naStanju!"
          (availabilityChanged)="onAvailabilityChanged($event)"
        >
        </availability-filter>
      </div>
    </div>

    <div class="filter-card" *ngIf="categories && !isCategoryWithSubgroup">
      <button
        class="section-title"
        type="button"
        (click)="toggleSection('categories')"
      >
        <span>Kategorije</span>
        <span class="count-chip" *ngIf="selectedSubgroupsCount">{{
          selectedSubgroupsCount
        }}</span>
        <i class="chevron" [class.expanded]="!isCollapsed('categories')"></i>
      </button>
      <div class="section-body" [class.collapsed]="isCollapsed('categories')">
        <category-filter
          [categories]="categories"
          [selectedSubgroupIds]="filter.podgrupe || []"
          (subgroupsChanged)="onSubgroupsChanged($event)"
        >
        </category-filter>
      </div>
    </div>

    <div class="filter-card" *ngIf="manufactures?.length">
      <button
        class="section-title"
        type="button"
        (click)="toggleSection('manufacturers')"
      >
        <span>Proizvođači</span>
        <span class="count-chip" *ngIf="selectedManufacturersCount">{{
          selectedManufacturersCount
        }}</span>
        <i class="chevron" [class.expanded]="!isCollapsed('manufacturers')"></i>
      </button>
      <div
        class="section-body"
        [class.collapsed]="isCollapsed('manufacturers')"
      >
        <div
          class="filter-prefilter"
          *ngIf="manufactures?.length ?? 0 > 7"
        >
          <autom-input-fields
            [placeholder]="'Pretraži proizvođače...'"
            [suffixIcon]="iconEnums.FILTER"
            [type]="inputTypeEnum.SEARCH"
            (emitSelected)="preFilterManufactures($event)"
          >
          </autom-input-fields>
        </div>

        <manufacture-filter
          [manufactures]="manufacturesModels"
          [selected]="filter.proizvodjaci || []"
          [filterTerm]="manufacturerPreFilter"
          (selectionChanged)="onManufactureChanged($event)"
        >
        </manufacture-filter>
      </div>
    </div>

    <div class="filter-buttons">
      <autom-button
        [label]="'Resetuj'"
        [type]="buttonTypes.SECONDARY"
        [theme]="buttonThemes.LIGHT_ORANGE"
        (clickEvent)="resetFilters()"
      >
      </autom-button>
      <autom-button
        [label]="'Zatvori'"
        [type]="buttonTypes.PRIMARY"
        [theme]="buttonThemes.DEFAULT"
        (clickEvent)="openFilterPopup = false"
      >
      </autom-button>
    </div>
  </div>
</autom-popup>
